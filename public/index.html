<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daily Notification Bot</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background: #f7f8fa;
        color: #111827;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
      }

      main {
        max-width: 680px;
        padding: 40px 24px;
      }

      h1 {
        font-size: 2rem;
        line-height: 1.1;
        margin: 0 0 16px;
      }

      p {
        color: #4b5563;
        font-size: 1rem;
        line-height: 1.6;
        margin: 0 0 12px;
      }

      code {
        background: #e5e7eb;
        border-radius: 4px;
        padding: 2px 6px;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #111827;
          color: #f9fafb;
        }

        p {
          color: #d1d5db;
        }

        code {
          background: #374151;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Daily Notification Bot</h1>
      <p>This deployment hosts the project status page for the Telegram price notification bot.</p>
      <p>The Telegram webhook endpoint is available at <code>/api/telegram</code>.</p>
      <p>Scheduled jobs run through GitHub Actions with Neon Postgres.</p>
    </main>
  </body>
</html>
