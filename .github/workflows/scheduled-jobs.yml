name: Scheduled bot jobs

on:
  schedule:
    - cron: "*/15 * * * *"
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Validate scheduled job secrets
        shell: bash
        run: |
          test -n "$BOT_TOKEN" || { echo "BOT_TOKEN secret is required"; exit 1; }
          test -n "$DATABASE_URL" || { echo "DATABASE_URL secret is required for scheduled jobs"; exit 1; }
          case "$DATABASE_URL" in
            file:*) echo "DATABASE_URL must point to a shared database for scheduled jobs"; exit 1 ;;
          esac
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: npm run schedule:alerts
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          GOLD_API_KEY: ${{ secrets.GOLD_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NODE_ENV: production

  daily-updates:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Validate scheduled job secrets
        shell: bash
        run: |
          test -n "$BOT_TOKEN" || { echo "BOT_TOKEN secret is required"; exit 1; }
          test -n "$DATABASE_URL" || { echo "DATABASE_URL secret is required for scheduled jobs"; exit 1; }
          case "$DATABASE_URL" in
            file:*) echo "DATABASE_URL must point to a shared database for scheduled jobs"; exit 1 ;;
          esac
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: npm run schedule:daily
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          GOLD_API_KEY: ${{ secrets.GOLD_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NODE_ENV: production
